services:
  - type: web
    name: smart-travel-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SMART_TRAVEL_EXPOSE_CODES
        value: "false"
      - key: REMINDER_CRON_TOKEN
        sync: false
      - key: REMINDER_NEXT_STOP_MINUTES
        value: "20"
      - key: REMINDER_EVENING_START_HOUR
        value: "20"
      - key: REMINDER_EVENING_END_HOUR
        value: "23"

  - type: cron
    name: smart-travel-reminder-cron
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: >-
      python3 -c "import os, urllib.request; base = 'http://' + os.environ['APP_HOSTPORT'].strip().rstrip('/'); req = urllib.request.Request(base + '/api/line/run-upcoming-reminders', data=b'', headers={'x-reminder-token': os.environ['REMINDER_CRON_TOKEN']}, method='POST'); print(urllib.request.urlopen(req, timeout=90).read().decode())"
    envVars:
      - key: APP_HOSTPORT
        fromService:
          type: web
          name: smart-travel-backend
          property: hostport
      - key: REMINDER_CRON_TOKEN
        sync: false
