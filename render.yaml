services:
  - type: web
    name: smart-travel-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SMART_TRAVEL_EXPOSE_CODES
        value: "false"
      - key: REMINDER_CRON_TOKEN
        sync: false
      - key: REMINDER_NEXT_STOP_MINUTES
        value: "20"
      - key: REMINDER_NEXT_STOP_GRACE_MINUTES
        value: "30"
      - key: REMINDER_EVENING_START_HOUR
        value: "20"
      - key: REMINDER_EVENING_END_HOUR
        value: "23"

  - type: cron
    name: smart-travel-reminder-cron
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: >-
      python3 -c "import os, urllib.request; req = urllib.request.Request('https://smart-travel-6zsf.onrender.com/api/line/run-upcoming-reminders', data=b'', headers={'x-reminder-token': os.environ['REMINDER_CRON_TOKEN']}, method='POST'); print(urllib.request.urlopen(req, timeout=90).read().decode(), flush=True)"
    envVars:
      - key: REMINDER_CRON_TOKEN
        sync: false
