services:
  - type: web
    name: smart-travel-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SMART_TRAVEL_EXPOSE_CODES
        value: "false"
      - key: REMINDER_CRON_TOKEN
        sync: false
      - key: REMINDER_NEXT_STOP_MINUTES
        value: "20"
      - key: REMINDER_NEXT_STOP_GRACE_MINUTES
        value: "30"
      - key: REMINDER_EVENING_START_HOUR
        value: "20"
      - key: REMINDER_EVENING_END_HOUR
        value: "23"

  - type: cron
    name: smart-travel-reminder-cron
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: python3 scripts/run_reminder_cron.py
    envVars:
      - key: SERVICE_MODE
        value: reminder-cron
      - key: REMINDER_API_BASE
        value: https://smart-travel-6zsf.onrender.com
      - key: REMINDER_CRON_TOKEN
        sync: false
