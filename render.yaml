envVarGroups:
  - name: smart-travel-reminder-shared
    envVars:
      - key: REMINDER_CRON_TOKEN
        generateValue: true

services:
  - type: web
    name: smart-travel-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SMART_TRAVEL_EXPOSE_CODES
        value: "false"
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_SSL
        value: "true"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_ADD_FRIEND_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEYS
        sync: false
      - fromGroup: smart-travel-reminder-shared
      - key: REMINDER_NEXT_STOP_MINUTES
        value: "20"
      - key: REMINDER_NEXT_STOP_GRACE_MINUTES
        value: "30"
      - key: REMINDER_EVENING_START_HOUR
        value: "20"
      - key: REMINDER_EVENING_END_HOUR
        value: "23"

  - type: cron
    name: smart-travel-reminder-cron
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: python3 scripts/run_reminder_cron.py
    envVars:
      - key: SERVICE_MODE
        value: reminder-cron
      - key: REMINDER_API_BASE
        value: https://smart-travel-backend-6ant.onrender.com
      - fromGroup: smart-travel-reminder-shared
