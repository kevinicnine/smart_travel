<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" viewBox="0 0 1100 820">
  <style>
    .title { font: 20px sans-serif; font-weight: bold; }
    .label { font: 16px sans-serif; }
    .month { font: 14px sans-serif; fill: #000; }
    .task { font: 14px sans-serif; }
    .grid { stroke: #ccc; stroke-width:1 }
    .bar { fill: #d81e06 }
    .box { fill: #fff; stroke:#000 }
  </style>

  <rect x="0" y="0" width="1100" height="820" fill="#fff" />

  <text x="20" y="32" class="title">專題進度甘特圖（2025/09 → 2026/06）</text>

  <!-- Months header -->
  <g transform="translate(260,60)">
    <rect x="0" y="0" width="820" height="40" fill="#f6f6f6" stroke="#000" />
    <text x="10" y="26" class="month">2025 年 9–10 月</text>
    <text x="110" y="26" class="month">2025 年 11–12 月</text>
    <text x="260" y="26" class="month">2026 年 1–2 月</text>
    <text x="410" y="26" class="month">2026 年 3–4 月</text>
    <text x="560" y="26" class="month">2026 年 5 月</text>
    <text x="680" y="26" class="month">2026 年 6 月</text>

    <!-- Vertical grid lines for months -->
    <g stroke="#ddd">
      <line x1="0" y1="40" x2="0" y2="700" />
      <line x1="120" y1="40" x2="120" y2="700" />
      <line x1="360" y1="40" x2="360" y2="700" />
      <line x1="600" y1="40" x2="600" y2="700" />
      <line x1="720" y1="40" x2="720" y2="700" />
      <line x1="860" y1="40" x2="860" y2="700" />
    </g>
  </g>

  <!-- Left labels column -->
  <g transform="translate(10,110)">
    <rect x="0" y="0" width="240" height="620" class="box" />

    <g transform="translate(10,30)">
      <text x="0" y="0" class="label">專題題目確立與資料蒐集</text>
      <text x="0" y="60" class="label">景點資料爬蟲與資料清理</text>
      <text x="0" y="120" class="label">前端介面設計與系統整合</text>
      <text x="0" y="180" class="label">智慧行程規劃與成本模型設計</text>
      <text x="0" y="240" class="label">AI 景點分類模型建置</text>
      <text x="0" y="300" class="label">即時情境感知功能開發</text>
      <text x="0" y="360" class="label">LINE 推播通知功能開發</text>
      <text x="0" y="420" class="label">系統測試與功能驗證</text>
      <text x="0" y="480" class="label">成果報告 Word/PPT 撰寫</text>
      <text x="0" y="540" class="label">口試報告練習</text>
    </g>
  </g>

  <!-- Bars area -->
  <g transform="translate(260,100)">
    <!-- helper row height = 60 -->
    <!-- Row 1: 專題題目確立與資料蒐集 (2025/09-10) -->
    <rect x="0" y="20" width="120" height="40" class="bar" rx="4" />
    <!-- Row 2: 景點資料爬蟲與資料清理 (2025/11-12, 2026/01-02, 2026/03-04, 2026/05) -->
    <rect x="120" y="80" width="240" height="40" class="bar" rx="4" />
    <rect x="360" y="80" width="240" height="40" class="bar" rx="4" opacity="0.95" />
    <rect x="600" y="80" width="120" height="40" class="bar" rx="4" />
    <!-- Row 3: 前端介面設計與系統整合 (2025/11-12, 2026/01-02) -->
    <rect x="120" y="140" width="240" height="40" class="bar" rx="4" />
    <!-- Row 4: 智慧行程規劃與成本模型設計 (2026/01-02, 2026/03-04) -->
    <rect x="360" y="200" width="240" height="40" class="bar" rx="4" />
    <!-- Row 5: AI 景點分類模型建置 (2026/01-02, 2026/03-04) -->
    <rect x="360" y="260" width="240" height="40" class="bar" rx="4" />
    <!-- Row 6: 即時情境感知功能開發 (2026/03-04, 2026/05) -->
    <rect x="600" y="320" width="120" height="40" class="bar" rx="4" />
    <rect x="360" y="320" width="240" height="40" class="bar" rx="4" />
    <!-- Row 7: LINE 推播通知功能開發 (2026/05-06) -->
    <rect x="600" y="380" width="360" height="40" class="bar" rx="4" />
    <!-- Row 8: 系統測試與功能驗證 (2026/05-06) -->
    <rect x="600" y="440" width="360" height="40" class="bar" rx="4" />
    <!-- Row 9: 成果報告 Word/PPT 撰寫 (2026/03-04, 2026/05-06) -->
    <rect x="360" y="500" width="240" height="40" class="bar" rx="4" />
    <rect x="600" y="500" width="360" height="40" class="bar" rx="4" />
    <!-- Row 10: 口試報告練習 (2026/05-06) -->
    <rect x="600" y="560" width="360" height="40" class="bar" rx="4" />

    <!-- horizontal separator lines -->
    <g stroke="#eee">
      <line x1="0" y1="0" x2="980" y2="0" />
      <line x1="0" y1="72" x2="980" y2="72" />
      <line x1="0" y1="132" x2="980" y2="132" />
      <line x1="0" y1="192" x2="980" y2="192" />
      <line x1="0" y1="252" x2="980" y2="252" />
      <line x1="0" y1="312" x2="980" y2="312" />
      <line x1="0" y1="372" x2="980" y2="372" />
      <line x1="0" y1="432" x2="980" y2="432" />
      <line x1="0" y1="492" x2="980" y2="492" />
      <line x1="0" y1="552" x2="980" y2="552" />
    </g>
  </g>

  <!-- caption -->
  <text x="20" y="780" class="label">說明：紅色區塊標示主要開發時段；水平欄位為各工作項目。</text>
</svg>