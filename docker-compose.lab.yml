version: "3.9"

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./backend/.env.production
  volumes:
    - ./deploy/data:/app/data

services:
  backend:
    <<: *backend-common
    container_name: smart-travel-backend
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  reminder-cron:
    <<: *backend-common
    container_name: smart-travel-reminder-cron
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      REMINDER_API_BASE: http://backend:8080
      REMINDER_INTERVAL_SECONDS: 300
    command: ["sh", "scripts/run_reminder_loop.sh"]

  web:
    image: nginx:1.27-alpine
    container_name: smart-travel-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/frontend:/usr/share/nginx/html:ro
